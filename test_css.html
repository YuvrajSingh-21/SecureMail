<!DOCTYPE html>
<html>
<head>
<style>
.badge-container {
    width: 90px;
    height: 20px;
    background: red;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    color: white;
    font-weight: bold;
    text-transform: uppercase;
    white-space: nowrap;
}
</style>
</head>
<body>
<div class="badge-container" style="font-size: min(8px, calc(100px / 24));">LEGITIMATE COMMUNICATION</div>
<div class="badge-container" style="font-size: min(8px, calc(100px / 4));">SAFE</div>
</body>
</html>
