{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SecureMail{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{% static 'SecureMail/assets/icons/favicon.ico' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="{% static 'SecureMail/css/global.css' %}">
    <link rel="stylesheet" href="{% static 'SecureMail/css/responsive.css' %}">
    {% block extra_css %}{% endblock %}
    <script>
        // Critical Theme Helper - Execute ASAP to prevent flash
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.documentElement.classList.toggle('dark', savedTheme === 'dark');
        })();
    </script>
</head>
<body class="h-full transition-colors duration-300">
    <script>
        // Synchronize body classes with theme for legacy components
        (function() {
            const theme = document.documentElement.getAttribute('data-theme');
            document.body.className = `h-full transition-colors duration-300 ${theme === 'dark' ? 'dark-mode bg-gray-900' : 'light-mode bg-slate-50'}`;
        })();
    </script>
    
    {% block content %}{% endblock %}

    {% if messages %}
    <div class="fixed bottom-4 right-4 z-50 flex flex-col gap-2">
        {% for message in messages %}
        <div class="px-6 py-3 rounded-xl shadow-xl glass-light border border-white/20 animate-slide-up flex items-center gap-3 {% if message.tags == 'error' %}bg-red-500/10 text-red-600{% elif message.tags == 'success' %}bg-green-500/10 text-green-600{% else %}bg-blue-500/10 text-blue-600{% endif %}">
            <i data-lucide="{% if message.tags == 'error' %}alert-circle{% elif message.tags == 'success' %}check-circle{% else %}info{% endif %}" class="w-5 h-5"></i>
            <span class="text-sm font-medium">{{ message }}</span>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <script>
        // Global Theme Toggle Function - Non-module version for direct onclick access
        window.toggleDarkMode = function() {
            const html = document.documentElement;
            const body = document.body;
            const currentTheme = html.getAttribute('data-theme') || 'light';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            if (newTheme === 'dark') {
                body.classList.add('dark-mode');
                body.classList.remove('light-mode');
                html.classList.add('dark');
            } else {
                body.classList.remove('dark-mode');
                body.classList.add('light-mode');
                html.classList.remove('dark');
            }
            
            // Trigger icon update
            if (window.updateThemeIcon) window.updateThemeIcon(newTheme === 'dark');
            console.log('Theme switched to:', newTheme);
        };
    </script>
    <script type="module" src="{% static 'SecureMail/js/app.js' %}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) {
                window.lucide.createIcons();
            }
        });
    </script>
    <script>
        // Final theme sanity check
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.body.className = 'h-full overflow-auto dark-mode bg-gray-900';
            } else {
                document.body.className = 'h-full overflow-auto bg-gray-50';
            }
            if (window.updateThemeIcon) window.updateThemeIcon(savedTheme === 'dark');
        })();
    </script>

    {% if user.is_authenticated %}
    <script>
        // Auto-sync in the background after page load
        window.addEventListener('load', () => {
            setTimeout(() => {
                fetch("{% url 'sync_gmail' %}?auto=1", {
                    method: 'GET',
                    headers: {'X-Requested-With': 'XMLHttpRequest'}
                }).catch(err => console.error("Auto-sync error:", err));
            }, 1000); // 1s delay so it doesn't block critical page load
        });
    </script>
    {% endif %}

    {% block extra_js %}{% endblock %}
</body>
</html>
