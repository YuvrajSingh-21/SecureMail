{% load static %}
<header class="w-full px-6 py-4 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between shrink-0 z-40 transition-colors duration-300">
    <!-- Left: Logo & Mobile Toggle -->
    <div class="flex items-center gap-4">
        <button class="lg:hidden text-gray-500 hover:text-gray-900 dark:hover:text-white transition" data-mobile-menu>
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-cyan-400 flex items-center justify-center shadow-lg shadow-blue-500/20 animate-glow">
                <i data-lucide="shield-check" class="w-6 h-6 text-white"></i>
            </div>
            <a href="{% url 'dashboard' %}" class="font-bold text-xl tracking-tight text-gray-900 dark:text-white hidden sm:block">SecureMail</a>
        </div>
    </div>

    <!-- Center: Search -->
    <div class="flex-1 max-w-2xl mx-8 hidden md:block">
        <form action="{% url 'inbox' %}" method="GET" class="relative group">
            <i data-lucide="search" class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
            <input type="text" name="q" placeholder="Search emails, threats, or security incidents..." class="w-full pl-12 pr-4 py-2.5 rounded-2xl bg-gray-100 dark:bg-gray-700/50 border-transparent focus:bg-white dark:focus:bg-gray-700 border focus:border-blue-500/50 focus:ring-4 focus:ring-blue-500/10 outline-none text-sm transition-all duration-300">
        </form>
    </div>

    <!-- Right: Actions -->
    <div class="flex items-center gap-4">
        <div class="hidden xl:flex items-center gap-2 px-3 py-1.5 rounded-xl bg-green-50 dark:bg-green-900/20 border border-green-100 dark:border-green-800/50">
            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
            <span class="text-[11px] text-green-600 dark:text-green-400 font-bold uppercase tracking-widest">Protected</span>
        </div>

        <div class="flex items-center gap-1">
            <a href="{% url 'sync_gmail' %}" class="p-2.5 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl transition-all" title="Synchronize Gmail">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            </a>

            <!-- Notifications -->
            <div class="relative group">
                <button class="p-2.5 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl transition-all relative" title="Notifications">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span class="absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white dark:border-gray-800"></span>
                </button>
                
                <div class="absolute right-0 mt-3 w-80 bg-white dark:bg-gray-800 rounded-2xl shadow-2xl border border-gray-100 dark:border-gray-700 py-3 hidden group-hover:block group-focus-within:block animate-slide-up z-50 overflow-hidden">
                    <div class="px-5 py-2 border-b border-gray-100 dark:border-gray-700 flex items-center justify-between mb-2">
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Notifications</p>
                        <div class="flex gap-2">
                            <button class="text-[9px] font-black text-blue-500 hover:underline uppercase tracking-tighter">Mark Read</button>
                            <span class="text-gray-300 dark:text-gray-700">|</span>
                            <button class="text-[9px] font-black text-gray-400 hover:text-red-500 hover:underline uppercase tracking-tighter">Clear All</button>
                        </div>
                    </div>                    <div class="max-h-72 overflow-y-auto">
                        <div class="px-5 py-4 border-b border-gray-50 dark:border-gray-700 hover:bg-blue-50/50 dark:hover:bg-blue-900/10 transition cursor-pointer group/item">
                            <div class="flex items-start gap-3">
                                <div class="w-8 h-8 rounded-lg bg-red-100 dark:bg-red-900/30 flex items-center justify-center shrink-0">
                                    <i data-lucide="alert-triangle" class="w-4 h-4 text-red-600 dark:text-red-400"></i>
                                </div>
                                <div>
                                    <p class="text-xs font-bold text-gray-900 dark:text-white mb-1">Threat Neutralized</p>
                                    <p class="text-[10px] text-gray-500 dark:text-gray-400 leading-relaxed">Credential phishing from 'amaz0n-verify.com' blocked.</p>
                                    <p class="text-[9px] text-blue-500 mt-2 font-black">2 MINS AGO</p>
                                </div>
                            </div>
                        </div>
                        <div class="px-5 py-4 border-b border-gray-50 dark:border-gray-700 hover:bg-blue-50/50 dark:hover:bg-blue-900/10 transition cursor-pointer group/item">
                            <div class="flex items-start gap-3">
                                <div class="w-8 h-8 rounded-lg bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center shrink-0">
                                    <i data-lucide="file-text" class="w-4 h-4 text-blue-600 dark:text-blue-400"></i>
                                </div>
                                <div>
                                    <p class="text-xs font-bold text-gray-900 dark:text-white mb-1">Security Digest</p>
                                    <p class="text-[10px] text-gray-500 dark:text-gray-400 leading-relaxed">Your weekly analysis report is ready for review.</p>
                                    <p class="text-[9px] text-blue-500 mt-2 font-black">YESTERDAY</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <a href="{% url 'reports' %}" class="block py-3 text-center text-xs font-bold text-blue-600 hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-all">View All Activity</a>
                </div>
            </div>

            <!-- Theme Toggle -->
            <button class="p-2.5 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl transition-all" onclick="toggleDarkMode()" title="Toggle Visual Mode">
                <i data-lucide="moon" class="w-5 h-5" data-theme-icon></i>
            </button>
        </div>

        <div class="h-8 w-px bg-gray-200 dark:bg-gray-700 mx-1 hidden sm:block"></div>

        <!-- Profile -->
        <div class="relative group">
            <button class="flex items-center gap-3 p-1 pr-3 rounded-2xl hover:bg-gray-100 dark:hover:bg-gray-700 transition-all outline-none">
                {% if user.google_account.profile_picture %}
                    <img src="{{ user.google_account.profile_picture }}" class="w-9 h-9 rounded-xl shadow-lg shadow-blue-500/20 object-cover" alt="Avatar">
                {% else %}
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-600 to-purple-600 flex items-center justify-center text-white text-sm font-black shadow-lg shadow-blue-500/20">
                        {{ user.username|slice:":1"|upper }}
                    </div>
                {% endif %}
                <div class="hidden lg:block text-left">
                    <p class="text-[11px] font-black text-gray-900 dark:text-white leading-none mb-0.5 uppercase tracking-wider">{{ user.username }}</p>
                    <p class="text-[10px] text-gray-500 dark:text-gray-400 font-bold leading-none">Standard User</p>
                </div>
                <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400 group-hover:text-gray-900 dark:group-hover:text-white transition-transform duration-300 group-hover:rotate-180"></i>
            </button>

            <!-- Profile Dropdown -->
            <div class="absolute right-0 mt-3 w-56 bg-white dark:bg-gray-800 rounded-2xl shadow-2xl border border-gray-100 dark:border-gray-700 py-3 hidden group-hover:block group-focus-within:block animate-slide-up z-50">
                <div class="px-5 py-2 border-b border-gray-50 dark:border-gray-700 mb-2">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Signed in as</p>
                    <p class="text-sm font-black truncate text-gray-900 dark:text-white">{{ user.email }}</p>
                </div>
                <a href="{% url 'profile' %}" class="flex items-center gap-3 px-5 py-2.5 text-sm font-bold text-gray-600 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-blue-900/20 hover:text-blue-600 transition-all">
                    <i data-lucide="user" class="w-4 h-4"></i> Profile
                </a>
                <a href="{% url 'settings' %}" class="flex items-center gap-3 px-5 py-2.5 text-sm font-bold text-gray-600 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-blue-900/20 hover:text-blue-600 transition-all">
                    <i data-lucide="settings" class="w-4 h-4"></i> Settings
                </a>
                <div class="h-px bg-gray-50 dark:bg-gray-700 my-2"></div>
                <a href="{% url 'logout' %}" class="flex items-center gap-3 px-5 py-2.5 text-sm font-bold text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Logout
                </a>
            </div>
        </div>
    </div>
</header>
